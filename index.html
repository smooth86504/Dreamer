<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12141B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="資產帳本">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>資產帳本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{
    --bg:#12141B;
    --bg-elev:#1B1E27;
    --bg-elev2:#242733;
    --border:#2B2E3A;
    --text:#F1F2F5;
    --text-dim:#9A9EAC;
    --text-faint:#666A78;
    --purple:#9C90E8;
    --purple-tint:#282450;
    --purple-text:#C9C0FF;
    --blue:#5B9BEF;
    --blue-tint:#1B2A45;
    --blue-text:#A9CBFF;
    --up:#FF6B6B;
    --down:#35D08C;
    --orange:#F2793D;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans TC',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .num{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
  button, input, select{font-family:inherit;}
  svg.icon{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

  #app{max-width:720px;margin:0 auto;padding:calc(20px + env(safe-area-inset-top)) 16px 110px;}

  header.topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:4px 2px 20px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .mark{width:30px;height:30px;color:var(--purple);}
  .brand h1{font-size:17px;margin:0;font-weight:700;letter-spacing:0.2px;}
  .topbar .icon-btn{
    background:var(--bg-elev);border:1px solid var(--border);border-radius:12px;
    width:38px;height:38px;display:flex;align-items:center;justify-content:center;
    color:var(--text-dim);cursor:pointer;
  }
  .topbar .icon-btn-group{display:flex;gap:8px;}
  .topbar .icon-btn.loading{pointer-events:none;opacity:0.6;}
  .topbar .icon-btn.loading svg{animation:spin 0.8s linear infinite;}

  .view{display:none;}
  .view.active{display:block;}

  /* ---------- 資產卡片 ---------- */
  .cards{display:flex;flex-direction:column;gap:14px;margin-bottom:20px;}
  .curr-card{
    background:var(--bg-elev);border:1px solid var(--border);border-radius:20px;
    padding:20px;
  }
  .curr-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .curr-head-left{display:flex;align-items:center;gap:8px;}
  .flag-dot{width:8px;height:8px;border-radius:50%;}
  .flag-dot.twd{background:var(--purple);}
  .flag-dot.usd{background:var(--blue);}
  .curr-label{font-size:13px;color:var(--text-dim);font-weight:500;}
  .curr-total{font-size:32px;font-weight:900;margin:2px 0 6px;letter-spacing:-0.5px;}
  .curr-delta{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:500;padding:3px 9px;border-radius:20px;}
  .curr-delta.up{color:var(--up);background:rgba(255,107,107,0.12);}
  .curr-delta.down{color:var(--down);background:rgba(53,208,140,0.12);}
  .curr-delta.flat{color:var(--text-faint);background:var(--bg-elev2);}
  .spark-wrap{height:40px;margin-top:10px;position:relative;}

  .range-row{display:flex;gap:8px;margin:2px 0 14px;}
  .range-row button{
    background:var(--bg-elev);border:1px solid var(--border);border-radius:20px;
    padding:6px 14px;font-size:12px;color:var(--text-dim);cursor:pointer;
  }
  .range-row button.active{background:var(--text);border-color:var(--text);color:var(--bg);font-weight:500;}

  .chart-card{
    background:var(--bg-elev);border:1px solid var(--border);border-radius:20px;
    padding:16px;margin-bottom:14px;
  }
  .chart-card h3{margin:0 0 10px;font-size:13px;font-weight:500;color:var(--text-dim);}
  .chart-wrap{height:170px;position:relative;}

  /* ---------- 資產配置長條 ---------- */
  .alloc-card{background:var(--bg-elev);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:20px;}
  .alloc-card h3{margin:0 0 14px;font-size:14px;font-weight:700;}
  .alloc-bar{display:flex;height:10px;border-radius:6px;overflow:hidden;background:var(--bg-elev2);margin-bottom:12px;}
  .alloc-bar span{height:100%;}
  .alloc-legend{display:flex;flex-wrap:wrap;gap:10px 0;font-size:13px;}
  .alloc-legend .item{display:flex;align-items:center;gap:8px;width:100%;}
  .alloc-legend .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .alloc-legend .val{font-weight:600;margin-left:6px;}
  .alloc-legend .pct{color:var(--text-dim);font-size:12px;margin-left:4px;}

  section.block{margin-bottom:24px;}
  section.block h2{font-size:14px;font-weight:700;margin:0 0 10px;padding-left:2px;}

  .rowlist{background:var(--bg-elev);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
  .row{
    display:flex;align-items:center;gap:10px;
    padding:13px 14px;font-size:13px;border-bottom:1px solid var(--border);
  }
  .row:last-child{border-bottom:none;}
  .row .type-tag{
    width:34px;height:34px;border-radius:10px;flex:none;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  }
  .type-tag.stock{background:var(--purple-tint);color:var(--purple-text);}
  .type-tag.cash{background:var(--blue-tint);color:var(--blue-text);}
  .row .name{flex:1;min-width:0;}
  .row .name b{display:block;font-size:13px;font-weight:600;}
  .row .name span{display:block;font-size:11px;color:var(--text-faint);margin-top:2px;}
  .row .value{text-align:right;flex:none;min-width:90px;}
  .row .value b{display:block;font-size:13px;}
  .row .value .delta{display:block;font-size:11px;margin-top:2px;}
  .delta.up{color:var(--up);}
  .delta.down{color:var(--down);}
  .delta.flat{color:var(--text-faint);}

  .qty-input{
    width:84px;padding:8px 9px;border:1px solid var(--border);border-radius:8px;
    font-size:13px;text-align:right;background:var(--bg-elev2);color:var(--text);
  }
  .icon-mini-btn{
    background:var(--bg-elev2);border:1px solid var(--border);border-radius:8px;
    width:32px;height:32px;flex:none;cursor:pointer;color:var(--text-dim);font-size:13px;
    display:flex;align-items:center;justify-content:center;
  }
  .save-btn{
    background:var(--text);color:var(--bg);border:none;border-radius:8px;
    padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;flex:none;
  }

  .topbar-editor-select{
    background:var(--bg-elev);color:var(--text);border:1px solid var(--border);
    border-radius:12px;padding:0 10px;font-size:13px;height:38px;
  }

  .editlog-item{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border);}
  .editlog-item:last-child{border-bottom:none;}
  .editlog-avatar{
    width:40px;height:40px;border-radius:50%;flex:none;object-fit:cover;
    background:var(--bg-elev2);
  }
  .editlog-avatar.fallback{
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;color:var(--text-dim);
  }
  .editlog-body{flex:1;min-width:0;}
  .editlog-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:4px;}
  .editlog-editor{font-size:14px;font-weight:700;flex:none;}
  .editlog-meta{font-size:12px;color:var(--text-dim);text-align:right;}
  .editlog-qty{font-size:16px;font-weight:700;margin-bottom:4px;}
  .editlog-qty.up{color:var(--up);}
  .editlog-qty.down{color:var(--down);}
  .editlog-time{font-size:11px;color:var(--text-faint);text-align:right;}

  table.hist{width:100%;border-collapse:collapse;font-size:12px;}
  table.hist th,table.hist td{padding:10px 6px;border-bottom:1px solid var(--border);text-align:right;}
  table.hist th:first-child,table.hist td:first-child{text-align:left;}
  table.hist th{color:var(--text-dim);font-weight:500;}

  /* ---------- 底部導覽 + 浮動按鈕 ---------- */
  .tabbar-wrap{
    position:fixed;bottom:0;left:0;right:0;
    display:flex;justify-content:center;padding:0 16px 22px;
    pointer-events:none;
  }
  .tabbar{
    pointer-events:auto;
    display:flex;gap:4px;background:var(--bg-elev);border:1px solid var(--border);
    border-radius:24px;padding:8px;box-shadow:0 8px 24px rgba(0,0,0,0.35);
  }
  .tabbar button{
    background:none;border:none;width:52px;height:44px;border-radius:18px;
    display:flex;align-items:center;justify-content:center;color:var(--text-faint);cursor:pointer;
  }
  .tabbar button.active{background:var(--bg-elev2);color:var(--text);}
  .fab{
    position:fixed;right:20px;bottom:32px;
    width:56px;height:56px;border-radius:50%;background:var(--orange);color:#fff;
    border:none;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px rgba(242,121,61,0.4);cursor:pointer;z-index:20;
  }

  .toast{
    position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
    background:var(--text);color:var(--bg);padding:10px 18px;border-radius:20px;
    font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:50;font-weight:500;
  }
  .toast.show{opacity:1;}

  .empty{color:var(--text-faint);font-size:13px;padding:24px;text-align:center;}
  .updated-note{font-size:11px;color:var(--text-faint);margin:-8px 0 18px;text-align:right;}

  .loading-overlay{
    position:fixed;inset:0;z-index:100;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:var(--bg);
  }
  .loading-overlay .spinner{
    width:34px;height:34px;border-radius:50%;
    border:3px solid var(--bg-elev2);border-top-color:var(--purple);
    animation:spin 0.8s linear infinite;
  }
  .loading-overlay span{font-size:13px;color:var(--text-dim);}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span>資料讀取中...</span>
</div>

<div id="app">
  <header class="topbar">
    <div class="brand">
      <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 18V11"/><path d="M11 18V6"/><path d="M18 18V14"/></svg>
      <h1>資產帳本</h1>
    </div>
    <div class="icon-btn-group">
      <select id="editorName" class="topbar-editor-select">
        <option>芒果</option>
        <option>脆脆</option>
      </select>
      <button class="icon-btn" id="refreshBtn" aria-label="重新整理股價">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
      </button>
    </div>
  </header>

  <div class="updated-note" id="updatedNote"></div>

  <div class="view active" id="view-dash">
    <div class="cards">
      <div class="curr-card">
        <div class="curr-head">
          <div class="curr-head-left"><span class="flag-dot twd"></span><span class="curr-label">台灣資產</span></div>
        </div>
        <div class="curr-total num" id="twdTotal">NT$ --</div>
        <div class="curr-delta flat" id="twdDelta">--</div>
        <div class="spark-wrap"><canvas id="sparkTWD"></canvas></div>
      </div>
      <div class="curr-card">
        <div class="curr-head">
          <div class="curr-head-left"><span class="flag-dot usd"></span><span class="curr-label">美國資產</span></div>
        </div>
        <div class="curr-total num" id="usdTotal">US$ --</div>
        <div class="curr-delta flat" id="usdDelta">--</div>
        <div class="spark-wrap"><canvas id="sparkUSD"></canvas></div>
      </div>
    </div>

    <div class="alloc-card">
      <h3>資產比例</h3>
      <div class="alloc-bar" id="allocBar"></div>
      <div class="alloc-legend">
        <div class="item"><span class="dot" style="background:var(--purple)"></span>台股<span class="val num" id="allocTwdStockVal">--</span><span class="pct" id="allocTwdStockPct"></span></div>
        <div class="item"><span class="dot" style="background:var(--blue)"></span>台幣<span class="val num" id="allocTwdCashVal">--</span><span class="pct" id="allocTwdCashPct"></span></div>
        <div class="item"><span class="dot" style="background:var(--orange)"></span>美股<span class="val num" id="allocUsdStockVal">--</span><span class="pct" id="allocUsdStockPct"></span></div>
        <div class="item"><span class="dot" style="background:var(--down)"></span>美金<span class="val num" id="allocUsdCashVal">--</span><span class="pct" id="allocUsdCashPct"></span></div>
      </div>
    </div>

    <div class="alloc-card">
      <h3>台股比例</h3>
      <div class="alloc-bar" id="twdRatioBar"></div>
      <div class="alloc-legend" id="twdRatioLegend"></div>
    </div>

    <div class="range-row">
      <button data-range="7" class="active">近7天</button>
      <button data-range="30">近30天</button>
      <button data-range="all">全部</button>
    </div>

    <div class="chart-card">
      <h3>台幣資產走勢</h3>
      <div class="chart-wrap"><canvas id="chartTWD" role="img" aria-label="台幣資產走勢折線圖"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>美金資產走勢</h3>
      <div class="chart-wrap"><canvas id="chartUSD" role="img" aria-label="美金資產走勢折線圖"></canvas></div>
    </div>

  </div>

  <div class="view" id="view-holdings">
    <section class="block">
      <h2>股票</h2>
      <div class="rowlist" id="stockList"></div>
    </section>
    <section class="block">
      <h2>現金</h2>
      <div class="rowlist" id="cashList"></div>
    </section>
  </div>

  <div class="view" id="view-history">
    <section class="block">
      <h2>每日快照</h2>
      <div style="overflow-x:auto;">
      <table class="hist" id="histTable">
        <thead><tr><th>日期</th><th>TWD現金</th><th>TWD股票</th><th>TWD總額</th><th>USD現金</th><th>USD股票</th><th>USD總額</th></tr></thead>
        <tbody></tbody>
      </table>
      </div>
    </section>
  </div>

  <div class="view" id="view-editlog">
    <section class="block">
      <h2>編輯紀錄</h2>
      <div class="rowlist" id="editLogList"></div>
    </section>
  </div>
</div>

<button class="fab" id="fabEdit" aria-label="編輯持股">
  <svg class="icon" viewBox="0 0 24 24" stroke="#fff"><path d="M17 3a2.8 2.8 0 0 1 4 4L7 21l-4 1 1-4Z"/></svg>
</button>

<div class="tabbar-wrap">
  <div class="tabbar">
    <button data-tab="dash" class="active" aria-label="總覽">
      <svg class="icon" viewBox="0 0 24 24"><path d="M4 11 12 4l8 7"/><path d="M6 10v9h12v-9"/></svg>
    </button>
    <button data-tab="holdings" aria-label="持股">
      <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M8 9h8M8 13h5"/></svg>
    </button>
    <button data-tab="history" aria-label="歷史">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    </button>
    <button data-tab="editlog" aria-label="編輯紀錄">
      <svg class="icon" viewBox="0 0 24 24"><path d="M4 19.5V6a2 2 0 0 1 2-2h9l5 5v10.5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><path d="M14 4v5h5"/><path d="M8 13h8M8 17h5"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ 設定：把你部署好的 Apps Script 網址與共用密碼貼在這裡 ============ */
const CONFIG = {
    API_URL: "https://script.google.com/macros/s/AKfycbyJ961S8Yw75pnK83SB0n2YONgk3N3U7F7saPgnA0EN9zIIxMyQEY_Bzrh5aUxvMgsA/exec",
  // API_URL: "https://script.google.com/macros/s/AKfycbyJ961S8Yw75pnK83SB0n2YONgk3N3U7F7saPgnA0EN9zIIxMyQEY_Bzrh5aUxvMgsA/exec",
  SHARED_PASSWORD: "12345678",
};
/* ============================================================================ */

let STATE = { holdings: [], prices: [], history: [], editLog: [] };
let fxUsdTwd = null; // 美元兌台幣匯率（來自台灣期交所公開資料）
const FX_FALLBACK_RATE = 32; // 匯率取得失敗時的備用值

async function loadFxRate(){
  try{
    const res = await fetch("https://openapi.taifex.com.tw/v1/DailyForeignExchangeRates");
    const data = await res.json();
    const list = Array.isArray(data) ? data : (data.data || []);
    if(!list.length) return;
    const latest = list.slice().sort((a,b)=> Number(a["Date"]) - Number(b["Date"])).pop();
    const rate = Number(latest["USD/NTD"]);
    if(rate) fxUsdTwd = rate;
  }catch(err){
    console.warn("匯率讀取失敗", err);
  }
}

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));

function showToast(msg){
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

function fmtMoney(n, sym){
  const v = Number(n)||0;
  return sym + " " + v.toLocaleString(undefined,{maximumFractionDigits:0});
}

async function apiGet(action){
  const url = CONFIG.API_URL + "?action=" + encodeURIComponent(action) + "&pwd=" + encodeURIComponent(CONFIG.SHARED_PASSWORD);
  const res = await fetch(url);
  return res.json();
}
async function apiPost(action, payload){
  const res = await fetch(CONFIG.API_URL, {
    method:"POST",
    body: JSON.stringify({ pwd: CONFIG.SHARED_PASSWORD, action, payload })
  });
  return res.json();
}

/* ---------- Tabs ---------- */
function switchTab(tabName){
  $$("[data-tab]").forEach(b=>b.classList.toggle("active", b.dataset.tab===tabName));
  $$(".view").forEach(v=>v.classList.remove("active"));
  $("#view-"+tabName).classList.add("active");
}
$$("[data-tab]").forEach(btn=>{
  btn.addEventListener("click", ()=> switchTab(btn.dataset.tab));
});
$("#fabEdit").addEventListener("click", ()=> switchTab("holdings"));

$("#refreshBtn").addEventListener("click", async ()=>{
  const btn = $("#refreshBtn");
  btn.classList.add("loading");
  try{
    const r = await apiPost("refreshNow", {});
    if(r.ok){
      await reloadData();
      showToast("股價已更新");
    } else {
      showToast(r.error || "更新失敗");
    }
  }catch(err){
    showToast("連線失敗："+err.message);
  }finally{
    btn.classList.remove("loading");
  }
});

/* ---------- 資料處理 ---------- */
function priceFor(code){
  return STATE.prices.find(p=>p["代號"]===code);
}

function currencySym(cur){
  if(cur==="TWD") return "NT$";
  if(cur==="JPY") return "JP$";
  return "US$";
}

function computeTotals(){
  let twdCash=0, twdStock=0, usdCash=0, usdStock=0;
  STATE.holdings.forEach(h=>{
    const qty = Number(h["數量"])||0;
    const cur = h["幣別"];
    if(h["類型"]==="現金"){
      if(cur==="TWD") twdCash+=qty; else if(cur==="USD") usdCash+=qty;
    } else if(h["類型"]==="股票"){
      const p = priceFor(h["代號"]);
      const price = p ? Number(p["現價"])||0 : 0;
      const val = qty*price;
      if(cur==="TWD") twdStock+=val; else if(cur==="USD") usdStock+=val;
    }
  });
  return {twdCash,twdStock,usdCash,usdStock,twdTotal:twdCash+twdStock,usdTotal:usdCash+usdStock};
}

function lastTwoHistory(){
  return STATE.history.slice().sort((a,b)=> new Date(a["日期"]) - new Date(b["日期"]));
}

function renderDeltaEl(el, todayVal, prevVal){
  if(prevVal===undefined || prevVal===null || isNaN(prevVal)){
    el.textContent = "尚無比較基準"; el.className="curr-delta flat"; return;
  }
  const diff = todayVal - prevVal;
  const pct = prevVal!==0 ? (diff/prevVal*100) : 0;
  const sign = diff>0?"▲":diff<0?"▼":"—";
  el.textContent = sign + " " + Math.abs(diff).toLocaleString(undefined,{maximumFractionDigits:0}) + "（" + pct.toFixed(2) + "%）";
  el.className = "curr-delta " + (diff>0?"up":diff<0?"down":"flat");
}

let charts = {};
function drawLine(canvasId, labels, data, color){
  if(charts[canvasId]) charts[canvasId].destroy();
  charts[canvasId] = new Chart(document.getElementById(canvasId), {
    type:'line',
    data:{ labels, datasets:[{ data, borderColor:color, borderWidth:2, pointRadius:0, tension:0.25, fill:false }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ mode:'index', intersect:false } },
      scales:{ x:{ display:false }, y:{ display:false } }
    }
  });
}

function drawFullChart(canvasId, labels, data, color, unitLabel){
  if(charts[canvasId]) charts[canvasId].destroy();
  charts[canvasId] = new Chart(document.getElementById(canvasId), {
    type:'line',
    data:{ labels, datasets:[{ label:unitLabel, data, borderColor:color, backgroundColor:color+"26", borderWidth:2, pointRadius:2, tension:0.2, fill:true }] },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ ticks:{ color:'#666A78', maxRotation:0, autoSkip:true, font:{size:10} }, grid:{ display:false } },
        y:{ ticks:{ color:'#666A78', font:{size:10} }, grid:{ color:'#2B2E3A' } }
      }
    }
  });
}

let currentRange = "7";
function historySliced(){
  const h = lastTwoHistory();
  if(currentRange==="all") return h;
  const n = Number(currentRange);
  return h.slice(-n);
}

function renderCharts(){
  const h = historySliced();
  const labels = h.map(r=> new Date(r["日期"]).toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'}));
  drawFullChart("chartTWD", labels, h.map(r=>Number(r["TWD資產總額"])||0), "#9C90E8", "TWD");
  drawFullChart("chartUSD", labels, h.map(r=>Number(r["USD資產總額"])||0), "#5B9BEF", "USD");

  const spark = lastTwoHistory().slice(-14);
  const sLabels = spark.map(r=>r["日期"]);
  drawLine("sparkTWD", sLabels, spark.map(r=>Number(r["TWD資產總額"])||0), "#9C90E8");
  drawLine("sparkUSD", sLabels, spark.map(r=>Number(r["USD資產總額"])||0), "#5B9BEF");
}

$$(".range-row button").forEach(b=>{
  b.addEventListener("click", ()=>{
    $$(".range-row button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    currentRange = b.dataset.range;
    renderCharts();
  });
});

function renderAllocation(){
  const t = computeTotals();
  const rate = fxUsdTwd || FX_FALLBACK_RATE;
  const usdStockInTwd = t.usdStock * rate;
  const usdCashInTwd = t.usdCash * rate;
  const total = t.twdStock + t.twdCash + usdStockInTwd + usdCashInTwd;
  const twdStockPct = total ? (t.twdStock/total*100) : 0;
  const twdCashPct = total ? (t.twdCash/total*100) : 0;
  const usdStockPct = total ? (usdStockInTwd/total*100) : 0;
  const usdCashPct = total ? (usdCashInTwd/total*100) : 0;

  $("#allocBar").innerHTML = `<span style="width:${twdStockPct}%;background:var(--purple)"></span><span style="width:${twdCashPct}%;background:var(--blue)"></span><span style="width:${usdStockPct}%;background:var(--orange)"></span><span style="width:${usdCashPct}%;background:var(--down)"></span>`;
  $("#allocTwdStockVal").textContent = "NT$ "+Math.round(t.twdStock).toLocaleString();
  $("#allocTwdCashVal").textContent = "NT$ "+Math.round(t.twdCash).toLocaleString();
  $("#allocUsdStockVal").textContent = "NT$ "+Math.round(usdStockInTwd).toLocaleString()+"（ US$ "+Math.round(t.usdStock).toLocaleString()+" ）";
  $("#allocUsdCashVal").textContent = "NT$ "+Math.round(usdCashInTwd).toLocaleString()+"（ US$"+Math.round(t.usdCash).toLocaleString()+" ）";
  $("#allocTwdStockPct").textContent = twdStockPct.toFixed(0)+"%";
  $("#allocTwdCashPct").textContent = twdCashPct.toFixed(0)+"%";
  $("#allocUsdStockPct").textContent = usdStockPct.toFixed(0)+"%";
  $("#allocUsdCashPct").textContent = usdCashPct.toFixed(0)+"%";
}

const TWD_RATIO_PALETTE = ["var(--purple)","var(--blue)","var(--orange)","var(--down)","var(--up)","#C9C0FF"];

function renderTwdStockRatio(){
  const bar = $("#twdRatioBar");
  const legend = $("#twdRatioLegend");

  const items = STATE.holdings
    .filter(h=>h["類型"]==="股票" && h["幣別"]==="TWD")
    .map(h=>{
      const p = priceFor(h["代號"]);
      const price = p ? Number(p["現價"])||0 : 0;
      const qty = Number(h["數量"])||0;
      return { name: h["名稱"]||h["代號"], val: price*qty };
    })
    .filter(it=>it.val>0);

  const total = items.reduce((s,it)=>s+it.val,0);
  if(!items.length || !total){
    bar.innerHTML = "";
    legend.innerHTML = '<div class="empty">尚無台股資料</div>';
    return;
  }

  bar.innerHTML = items.map((it,i)=>{
    const pct = it.val/total*100;
    return `<span style="width:${pct}%;background:${TWD_RATIO_PALETTE[i%TWD_RATIO_PALETTE.length]}"></span>`;
  }).join("");

  legend.innerHTML = items.map((it,i)=>{
    const pct = it.val/total*100;
    return `<div class="item"><span class="dot" style="background:${TWD_RATIO_PALETTE[i%TWD_RATIO_PALETTE.length]}"></span>${it.name}<span class="val num">NT$ ${Math.round(it.val).toLocaleString()}</span><span class="pct">${pct.toFixed(0)}%</span></div>`;
  }).join("");
}

function renderDashCards(){
  const t = computeTotals();
  $("#twdTotal").textContent = fmtMoney(t.twdTotal, "NT$");
  $("#usdTotal").textContent = fmtMoney(t.usdTotal, "US$");

  const hist = lastTwoHistory();
  const prevRow = hist.length ? hist[hist.length-1] : null;
  renderDeltaEl($("#twdDelta"), t.twdTotal, prevRow ? Number(prevRow["TWD資產總額"]) : undefined);
  renderDeltaEl($("#usdDelta"), t.usdTotal, prevRow ? Number(prevRow["USD資產總額"]) : undefined);
}

let editingRows = new Set();

function renderHoldingsEditor(){
  const stockWrap = $("#stockList");
  const cashWrap = $("#cashList");
  const stocks = STATE.holdings.filter(h=>h["類型"]==="股票");
  const cash = STATE.holdings.filter(h=>h["類型"]==="現金");

  const rowHtml = (h) => {
    const isStock = h["類型"]==="股票";
    const sym = currencySym(h["幣別"]);
    const qty = Number(h["數量"])||0;

    if(editingRows.has(String(h.__row))){
      return `<div class="row">
        <span class="type-tag ${isStock?"stock":"cash"}">${h["幣別"]}</span>
        <div class="name"><b>${h["名稱"]||h["代號"]}</b><span>${h["代號"]}</span></div>
        <input class="qty-input num" type="number" step="any" value="${h["數量"]}" data-row="${h.__row}">
        <button class="save-btn" data-row="${h.__row}" data-action="save">儲存</button>
        <button class="icon-mini-btn" data-row="${h.__row}" data-action="cancel" aria-label="取消">
          <svg class="icon" style="width:14px;height:14px" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </button>
        <button class="icon-mini-btn" data-row="${h.__row}" data-action="delete" aria-label="刪除">
          <svg class="icon" style="width:14px;height:14px" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
        </button>
      </div>`;
    }

    let infoHtml;
    if(isStock){
      const p = priceFor(h["代號"]);
      const price = p ? Number(p["現價"])||0 : 0;
      const prev = p ? Number(p["昨日收盤"])||price : price;
      const val = price*qty;
      const diffPct = prev ? ((price-prev)/prev*100) : 0;
      const cls = diffPct>0?"up":diffPct<0?"down":"flat";
      const valStr = h["幣別"]==="TWD" ? (val/10000).toFixed(1)+"萬" : fmtMoney(val, sym);
      infoHtml = `<div class="name"><b>${h["名稱"]||h["代號"]}</b><span>${qty.toLocaleString()} 股 · 現值 ${valStr}</span></div>
        <div class="value">
          <b class="num">${price}</b>
          <span class="num delta ${cls}">${diffPct>=0?'▲':'▼'} ${Math.abs(diffPct).toFixed(2)}%</span>
        </div>`;
    } else {
      infoHtml = `<div class="name"><b>${h["名稱"]||h["代號"]}</b><span>${h["代號"]}</span></div>
        <div class="value"><b class="num">${fmtMoney(qty, sym)}</b></div>`;
    }

    return `<div class="row">
      <span class="type-tag ${isStock?"stock":"cash"}">${h["幣別"]}</span>
      ${infoHtml}
      <button class="icon-mini-btn" data-row="${h.__row}" data-action="edit" aria-label="編輯">
        <svg class="icon" style="width:14px;height:14px" viewBox="0 0 24 24"><path d="M17 3a2.8 2.8 0 0 1 4 4L7 21l-4 1 1-4Z"/></svg>
      </button>
    </div>`;
  };

  stockWrap.innerHTML = stocks.length ? stocks.map(rowHtml).join("") : '<div class="empty">尚無股票</div>';
  cashWrap.innerHTML = cash.length ? cash.map(rowHtml).join("") : '<div class="empty">尚無現金項目</div>';

  $$("#view-holdings [data-action='edit']").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      editingRows.add(btn.dataset.row);
      renderHoldingsEditor();
    });
  });
  $$("#view-holdings [data-action='cancel']").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      editingRows.delete(btn.dataset.row);
      renderHoldingsEditor();
    });
  });
  $$("#view-holdings [data-action='save']").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const row = btn.dataset.row;
      const input = document.querySelector(`.qty-input[data-row="${row}"]`);
      const editor = $("#editorName").value;
      btn.textContent = "儲存中";
      const r = await apiPost("updateHolding", { row: Number(row), "數量": Number(input.value), editor });
      btn.textContent = "儲存";
      if(r.ok){ editingRows.delete(row); showToast("已更新數量"); await reloadData(); } else { showToast(r.error||"更新失敗"); }
    });
  });
  $$("#view-holdings [data-action='delete']").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      if(!confirm("確定要刪除這個項目嗎？")) return;
      const row = btn.dataset.row;
      const r = await apiPost("deleteHolding", { row: Number(row) });
      if(r.ok){ editingRows.delete(row); showToast("已刪除"); await reloadData(); } else { showToast(r.error||"刪除失敗"); }
    });
  });
}

function renderHistoryTable(){
  const tbody = $("#histTable tbody");
  const h = lastTwoHistory().slice().reverse();
  if(!h.length){ tbody.innerHTML = '<tr><td colspan="7" class="empty">尚無歷史紀錄</td></tr>'; return; }
  tbody.innerHTML = h.map(r=>`<tr>
    <td>${new Date(r["日期"]).toLocaleDateString('zh-TW')}</td>
    <td class="num">${Number(r["TWD現金"]||0).toLocaleString()}</td>
    <td class="num">${Number(r["TWD股票市值"]||0).toLocaleString()}</td>
    <td class="num">${Number(r["TWD資產總額"]||0).toLocaleString()}</td>
    <td class="num">${Number(r["USD現金"]||0).toLocaleString()}</td>
    <td class="num">${Number(r["USD股票市值"]||0).toLocaleString()}</td>
    <td class="num">${Number(r["USD資產總額"]||0).toLocaleString()}</td>
  </tr>`).join("");
}

const EDITOR_AVATARS = { "芒果": "EditorB.jpg", "脆脆": "EditorA.jpg" };

function renderEditLogList(){
  const wrap = $("#editLogList");
  const log = STATE.editLog.slice().sort((a,b)=> new Date(b["時間"]) - new Date(a["時間"]));
  if(!log.length){ wrap.innerHTML = '<div class="empty">尚無編輯紀錄</div>'; return; }

  wrap.innerHTML = log.map(r=>{
    const editor = r["編輯者"]||"";
    const before = Number(r["編輯前數量"]||0);
    const after = Number(r["編輯後數量"]||0);
    const diff = after - before;
    const qtyCls = diff>0?"up":diff<0?"down":"";
    const diffStr = (diff>0?"+":"") + diff.toLocaleString();
    const avatarSrc = EDITOR_AVATARS[editor];
    const avatar = avatarSrc
      ? `<img class="editlog-avatar" src="${avatarSrc}" alt="${editor}">`
      : `<div class="editlog-avatar fallback">${editor ? editor.charAt(0) : "?"}</div>`;
    const dateStr = r["時間"] ? new Date(r["時間"]).toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'}) : "";

    return `<div class="editlog-item">
      ${avatar}
      <div class="editlog-body">
        <div class="editlog-top">
          <span class="editlog-editor">${editor}</span>
          <span class="editlog-meta">${r["類型"]||""} · ${r["名稱"]||""} · ${r["幣別"]||""}</span>
        </div>
        <div class="editlog-qty num ${qtyCls}">${diffStr} 現為 ${after.toLocaleString()}</div>
        <div class="editlog-time">${dateStr}</div>
      </div>
    </div>`;
  }).join("");
}

function renderUpdatedNote(){
  const p = STATE.prices[0];
  if(p && p["更新時間"]){
    $("#updatedNote").textContent = "股價更新於 " + new Date(p["更新時間"]).toLocaleString('zh-TW');
  } else {
    $("#updatedNote").textContent = "";
  }
}

function renderAll(){
  renderDashCards();
  renderAllocation();
  renderTwdStockRatio();
  renderCharts();
  renderHoldingsEditor();
  renderHistoryTable();
  renderEditLogList();
  renderUpdatedNote();
}

async function reloadData(){
  const data = await apiGet("dashboard");
  if(data.ok){
    STATE.holdings = data.holdings; STATE.prices = data.prices; STATE.history = data.history; STATE.editLog = data.editLog || [];
    renderAll();
  } else {
    showToast(data.error || "讀取失敗");
  }
}

(async function init(){
  if(CONFIG.API_URL.indexOf("http") !== 0){
    showToast("尚未設定 API 網址，請先在程式碼 CONFIG.API_URL 填入你的 Apps Script 網址");
    $("#loadingOverlay").remove();
    return;
  }
  try{
    await Promise.all([reloadData(), loadFxRate()]);
    renderAllocation();
  }catch(err){
    showToast("連線失敗："+err.message);
  }finally{
    $("#loadingOverlay").remove();
  }
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
